<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font: 600 40px 'Segoe UI', sans-serif;
    }
  </style>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8A2BE2;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#FF00FF;stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Normal text -->
  <text x="20" y="70" fill="#c9d1d9" class="text">
    Hi there, I'm 
  </text>

  <!-- Gradient name -->
  <text x="255" y="70" fill="url(#grad)" class="text">
    Ammogh
  </text>
</svg>